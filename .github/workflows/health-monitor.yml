name: Backend Health Monitor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run this cycle
        id: cadence
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
            echo "Manual run detected: running check now."
            exit 0
          fi

          days_since_epoch=$(( $(date -u +%s) / 86400 ))
          if (( days_since_epoch % 6 == 0 )); then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
            echo "6-day cadence hit: running check."
          else
            echo "run_check=false" >> "$GITHUB_OUTPUT"
            echo "Not a 6-day run window: skipping this cycle."
          fi

      - name: Checkout
        if: steps.cadence.outputs.run_check == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cadence.outputs.run_check == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        if: steps.cadence.outputs.run_check == 'true'
        working-directory: Backend
        run: npm ci

      - name: Validate HEALTHCHECK_URL secret exists
        if: steps.cadence.outputs.run_check == 'true'
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL secret is missing. Add it in repo settings."
            exit 1
          fi

      - name: Run remote backend health check
        if: steps.cadence.outputs.run_check == 'true'
        working-directory: Backend
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          HEALTHCHECK_EXPECT_DB: 'true'
          HEALTHCHECK_TIMEOUT_MS: '20000'
        run: npm run healthcheck

      - name: Skip notice
        if: steps.cadence.outputs.run_check != 'true'
        run: echo "Skipping run. Next automatic check occurs on the next 6-day cadence window."
